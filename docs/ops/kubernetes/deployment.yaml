apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsm-backend
  labels:
    app: fsm-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fsm-backend
  template:
    metadata:
      labels:
        app: fsm-backend
    spec:
      serviceAccountName: fsm-backend
      containers:
        - name: app
          image: ghcr.io/lucanovello/fsm-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: fsm-backend-config
            - secretRef:
                name: fsm-backend-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
